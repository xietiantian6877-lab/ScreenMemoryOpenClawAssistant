<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>屏幕记忆助手</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" id="appShell">
      <section class="composer-view">
        <div class="path-line" id="windowText">识别屏幕：等待识别</div>
        <div class="input-row">
          <button id="openMemoryBtn" class="icon" title="打开记忆">＋</button>
          <input id="composerInput" placeholder="在 电脑识别 本地随时向 Codex 提问" autocomplete="off" />
          <button id="settingsBtn" class="plain" title="设置">⋯</button>
          <button id="voiceBtn" class="plain" title="语音">♩</button>
          <button id="sendBtn" class="send" title="发送">↑</button>
        </div>
        <div class="tiny-line">
          <span id="connectionText">未填写地址</span>
          <span id="syncText">未同步</span>
        </div>
      </section>

      <section class="settings-view" id="settingsView">
        <div class="settings-title">
          <span>设置</span>
          <button id="settingsBackBtn">返回</button>
        </div>
        <div class="settings-row">
          <input id="tunnelInput" type="url" placeholder="隧穿地址" autocomplete="off" />
          <button id="saveTunnelBtn">保存</button>
          <button id="syncTodayBtn" class="secondary">同步</button>
          <button id="testPopupBtn" class="secondary">测试</button>
        </div>
        <div class="settings-row secondary-row">
          <button id="openMemoryBtnSettings" class="secondary">打开记忆</button>
          <span id="settingsStatus">未填写地址</span>
        </div>
      </section>

      <aside class="pet-card" id="petCard">
        <div id="petFace" class="pet-face">(•‿•)</div>
        <button id="expandBtn" class="expand-btn" title="展开">◀</button>
      </aside>

      <div class="window-actions">
        <button id="collapseBtn" class="collapse-btn" title="收起">▶</button>
      </div>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
