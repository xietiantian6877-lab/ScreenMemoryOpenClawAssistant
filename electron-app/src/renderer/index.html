<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>屏幕记忆 OpenClaw 助手</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" id="appShell">
      <section class="composer-view">
        <div class="path-line" id="windowText">识别屏幕：等待识别</div>
        <div class="input-row">
          <button id="permissionBtn" class="permission-btn codex-muted" type="button" title="Codex 权限">完全访问权限</button>
          <input id="composerInput" placeholder="我有什么可以帮你" autocomplete="off" />
          <div class="home-model-bar">
            <button id="homeProviderBtn" class="model-chip" type="button">OpenAI</button>
            <select id="homeModelSelect" title="模型">
              <option value="gpt-5.5">5.5</option>
            </select>
            <select id="homeReasoningSelect" title="推理强度">
              <option value="xhigh">中</option>
              <option value="high">高</option>
              <option value="medium">中</option>
              <option value="low">低</option>
            </select>
          </div>
          <button id="settingsBtn" class="plain" title="设置">...</button>
          <button id="sendBtn" class="send" title="发送">↑</button>
        </div>
        <div class="tiny-line">
          <span id="connectionText">本地判断</span>
          <span id="syncText">未同步</span>
          <span id="packageText">未打包</span>
        </div>
      </section>

      <section class="settings-view" id="settingsView">
        <div class="settings-title">
          <button id="settingsBackBtn" class="back-btn" title="返回">‹</button>
          <span>设置</span>
        </div>
        <div class="settings-row provider-row settings-provider-row">
          <input id="directBaseUrlInput" type="url" placeholder="OpenAI base_url" autocomplete="off" />
          <input id="directApiKeyInput" type="password" placeholder="OpenAI API key" autocomplete="off" />
          <button id="refreshModelsBtn" class="secondary" type="button">模型</button>
          <button id="saveDirectBtn" type="button">保存</button>
        </div>
        <div class="settings-row codex-row settings-codex-row" id="codexOptions">
          <span id="codexStatusText">Codex 检测中</span>
          <label class="guide-toggle">
            <input id="codexSearchToggle" type="checkbox" />
            <span>联网</span>
          </label>
          <button id="refreshCodexBtn" class="secondary" type="button">检测</button>
        </div>
        <div class="settings-row secondary-row controls-row">
          <label class="chat-frequency">
            <span>聊天频率</span>
            <input id="chatFrequencyInput" type="range" min="0" max="100" step="5" />
            <output id="chatFrequencyText">70%</output>
          </label>
          <label class="guide-toggle">
            <input id="guidanceToggle" type="checkbox" />
            <span>操作指导</span>
          </label>
          <label class="buddy-mode">
            <span>说话位置</span>
            <select id="buddyModeSelect">
              <option value="cursor">鼠标旁</option>
              <option value="corner">右上角</option>
              <option value="off">关闭常驻</option>
            </select>
          </label>
        </div>
        <div class="settings-row compact-row">
          <button id="packageTodayBtn" class="secondary">今日包</button>
        </div>
        <div class="settings-row">
          <input id="tunnelInput" type="url" placeholder="可选：OpenClaw 隧穿地址" autocomplete="off" />
          <button id="saveTunnelBtn" class="secondary">保存隧穿</button>
          <button id="syncTodayBtn" class="secondary">同步</button>
          <button id="testPopupBtn" class="secondary">测试</button>
        </div>
        <div class="settings-row secondary-row memory-row">
          <button id="openMemoryBtnSettings" class="secondary">打开记忆</button>
          <button id="openPackagesBtn" class="secondary">打开记忆包</button>
          <span id="settingsStatus">本地判断</span>
        </div>
      </section>

      <aside class="pet-card" id="petCard">
        <div id="petFace" class="pet-face">(•‿•)</div>
      </aside>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
